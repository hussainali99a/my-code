<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Short URL</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-green-400 to-blue-500 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">
            ✅ Your Short URL
        </h2>

        <a 
            href="{{ short_url }}" 
            class="text-blue-600 text-lg font-semibold break-all hover:underline"
        >
            {{ short_url }}
        </a>

        <div class="mt-6 flex gap-3 justify-center">
            <a href="/" 
               class="bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300">
                Back
            </a>

            <button 
                onclick="copyToClipboard()"
                class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700"
            >
                Copy
            </button>
        </div>
    </div>

    <script>
        function copyToClipboard() {
            navigator.clipboard.writeText("{{ short_url }}");
            alert("Copied to clipboard!");
        }
    </script>

</body>
</html>
